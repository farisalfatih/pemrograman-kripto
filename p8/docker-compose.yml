version: '3.8'

services:

  # ── Database PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: btc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── PHP-FPM (web) ────────────────────────────────────────────
  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: btc_php
    restart: unless-stopped
    volumes:
      - ./web:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  # ── Nginx web server ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: btc_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./web:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  # ── Fetcher daemon (loop 5 detik) ────────────────────────────
  fetcher:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: btc_fetcher
    restart: unless-stopped
    volumes:
      - ./web:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: ["php", "/var/www/html/fetcher.php"]

volumes:
  postgres_data:
